name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: porfavor-linux-amd64

          - goos: linux
            goarch: arm64
            name: porfavor-linux-arm64

          - goos: linux
            goarch: arm
            goarm: 7
            name: porfavor-linux-arm

          - goos: darwin
            goarch: amd64
            name: porfavor-darwin-amd64

          - goos: darwin
            goarch: arm64
            name: porfavor-darwin-arm64

          - goos: windows
            goarch: amd64
            name: porfavor-windows-amd64.exe

          - goos: windows
            goarch: arm64
            name: porfavor-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
